<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Async Patterns Test</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; }
        #log { background: #333; color: #fff; padding: 15px; border-radius: 5px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Async Patterns Test</h1>
    <p>Открой консоль (F12), чтобы увидеть детали запросов и повторов.</p>
    <div id="log">Ожидание результатов...</div>

    <script type="module">
        import { DataFetcher } from './async/DataFetcher.js';

        class PromiseHttpClient {
            constructor(baseUrl = '') {
                this.baseUrl = baseUrl;
            }

            async get(path) {
                const response = await fetch(`${this.baseUrl}${path}`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return response.json();
            }
        }

        async function withRetry(fn, options = {}) {
            const maxAttempts = options.maxAttempts ?? 3;
            const delayMs = options.delayMs ?? 400;

            let lastError;
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                try {
                    return await fn();
                } catch (error) {
                    lastError = error;
                    if (attempt < maxAttempts) {
                        await new Promise(resolve => setTimeout(resolve, delayMs));
                    }
                }
            }

            throw lastError;
        }

        const logDiv = document.getElementById('log');
        const logger = (msg) => {
            logDiv.textContent += `\n> ${msg}`;
            console.log(msg);
        };

        async function runTest() {
            const client = new PromiseHttpClient('https://jsonplaceholder.typicode.com');
            const fetcher = new DataFetcher(client);

            // 1. Тест Retry (специально вызываем ошибку неправильным URL)
            logger("Запуск теста Retry (ожидай 3 попытки в консоли)...");
            try {
                await withRetry(() => client.get('/non-existent-page'), { maxAttempts: 3 });
            } catch (e) {
                logger(`Retry тест завершен: Ошибка поймана после всех попыток.`);
            }

            // 2. Тест Parallel Fetching
            logger("Запуск параллельного получения данных пользователя...");
            try {
                const data = await fetcher.fetchUserWithDetails(1);
                logger(`Данные получены! Имя пользователя: ${data.user.name}, Постов: ${data.posts.length}`);
            } catch (e) {
                logger(`Ошибка: ${e.message}`);
            }
        }

        runTest();
    </script>
</body>
</html>
