<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Flyweight — Forest Renderer</title>
    <style>
        body { margin: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        canvas { border: 2px solid #4a4a6a; border-radius: 4px; }
        h1 { color: #e0e0e0; font-family: sans-serif; margin-bottom: 12px; }
    </style>
</head>
<body>
    <h1>Flyweight Pattern — Forest (10 000 деревьев)</h1>
    <canvas id="forestCanvas" width="800" height="600"></canvas>

    <script type="module">
        import { ForestRenderer } from "./forest/ForestRender.js";

        const renderer = new ForestRenderer("forestCanvas");
        renderer.generateForest(10000);
        const stats = renderer.render();
        console.log("=== Статистика экономии памяти (Flyweight) ===", stats);
    </script>
</body>
</html>
