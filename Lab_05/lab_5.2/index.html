<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Shop Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-slate-900">

    <div class="max-w-4xl mx-auto py-10 px-6">
        <header class="text-center mb-12">
            <h1 id="main-title" class="text-4xl font-black tracking-tight text-indigo-600 mb-2"></h1>
            <p id="app-status" class="text-slate-500 font-medium"></p>
        </header>

        <section class="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 mb-20">
            <h2 class="text-xl font-bold mb-4">Store Performance</h2>
            <p class="text-slate-600 mb-6">Нажмите кнопку, чтобы загрузить данные аналитики (Dynamic Import on Interaction).</p>
            
            <button id="load-stats-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl font-bold transition-all hover:shadow-lg active:scale-95">
                Load Live Stats
            </button>

            <div id="stats-container" class="mt-8"></div>
        </section>

        <div class="h-96 flex flex-col items-center justify-center text-slate-300 italic">
            <p>Прокрутите вниз для загрузки отзывов...</p>
            <div class="mt-4 animate-bounce">↓</div>
        </div>
        <div class="h-96"></div>

        <section id="reviews-section" class="bg-slate-900 p-8 rounded-3xl text-white opacity-30 transition-all duration-1000">
            <div id="reviews-container">
                <p class="text-center py-10">Waiting for visibility (Import on Visibility)...</p>
            </div>
        </section>
    </div>

    <script type="module" src="./modules/app.mjs"></script>
</body>
</html>
