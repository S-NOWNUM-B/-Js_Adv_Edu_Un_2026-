<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo MVC</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        .todo-app { background: #f5f5f5; padding: 20px; border-radius: 8px; }
        .todo-form { display: flex; gap: 10px; margin-bottom: 20px; }
        .todo-list { list-style: none; padding: 0; }
        .todo-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: white; border-bottom: 1px solid #ddd; }
        .completed .todo-text { text-decoration: line-through; color: #888; }
        .todo-text { flex: 1; cursor: pointer; }
        .todo-stats { margin-bottom: 20px; color: #666; font-size: 14px; display: flex; gap: 20px; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module">
        import { TodoController } from './mvc/controller/TodoController.js';
        new TodoController('app');
    </script>
</body>
</html>
