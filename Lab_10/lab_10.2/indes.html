<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MVVM Form</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        .error { color: red; font-size: 12px; }
        .preview { background: #eee; padding: 15px; margin-top: 20px; }
        .success { color: green; margin-top: 10px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module">
        import { UserProfileViewModel } from './mvvm/viewmodel/UserProfileViewModel.js';
        import { UserProfileForm } from './mvvm/view/UserProfileForm.js';
        
        const vm = new UserProfileViewModel();
        new UserProfileForm('app', vm);
    </script>
</body>
</html>
